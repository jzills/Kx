repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: gen-command-table
        name: Regenerate README command table
        language: system
        entry: python scripts/gen_command_table.py
        pass_filenames: false
        always_run: true
