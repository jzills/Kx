name: Release

on:
  push:
    branches:
      - 'release/**'

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from branch name
        id: version
        run: |
          VERSION=$(bash .github/scripts/extract-version.sh "${GITHUB_REF#refs/heads/}")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Install dev dependencies and run tests
        run: pip install -e ".[dev]" && pytest -v

      - name: Set version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.value }}\"/" pyproject.toml

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  merge:
    name: Open PR to Main
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      pull-requests: write
    steps:
      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release v${{ needs.build-and-publish.outputs.version }}" \
            --body "Automated release PR for v${{ needs.build-and-publish.outputs.version }}. Package published to PyPI successfully." \
            --base main \
            --head "${{ github.ref_name }}")
          gh pr merge "$PR_URL" --merge --auto
