name: Release

on:
  push:
    branches:
      - 'release/**'

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from branch name
        id: version
        run: |
          VERSION=$(bash .github/scripts/extract-version.sh "${GITHUB_REF#refs/heads/}")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Install dev dependencies and run tests
        run: pip install -e ".[dev]" && pytest -v

      - name: Set version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.value }}\"/" pyproject.toml

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload --skip-existing dist/*

  tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.build-and-publish.outputs.version }}"
          git push origin "v${{ needs.build-and-publish.outputs.version }}"

  merge:
    name: Open PR to Main
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Release v${{ needs.build-and-publish.outputs.version }}" \
            --body "Automated release PR for v${{ needs.build-and-publish.outputs.version }}. Package published to PyPI successfully." \
            --base main \
            --head "${{ github.ref_name }}")
          gh pr merge "$PR_URL" --merge --auto

  merge-back:
    name: Merge Release Back to Develop
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create PR to merge release branch back into develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AHEAD=$(gh api repos/$GITHUB_REPOSITORY/compare/develop...${{ github.ref_name }} --jq '.ahead_by')
          if [ "$AHEAD" -eq 0 ]; then
            echo "No commits to merge back — branches are already in sync."
            exit 0
          fi
          PR_URL=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "chore: merge ${{ github.ref_name }} back into develop" \
            --body "Automated post-release merge. Brings release fixes from \`${{ github.ref_name }}\` back into \`develop\` to keep branches in sync." \
            --base develop \
            --head "${{ github.ref_name }}")
          gh pr merge "$PR_URL" --merge --auto
